<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>APRS Updater Daemon</title>
    <style>
        body { font-family: monospace; max-width: 900px; margin: 20px auto; padding: 0 20px; }
        h1, h2 { border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .section { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 5px; }
        label { display: block; margin: 5px 0; }
        input, select, button { font-family: monospace; padding: 5px; margin: 2px; }
        button { cursor: pointer; background: #007bff; color: white; border: none; border-radius: 3px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
        .obj { border: 1px solid #ddd; padding: 10px; margin: 5px 0; }
        .enabled { background: #e6ffe6; }
        .log { background: #000; color: #0f0; padding: 10px; height: 200px; overflow-y: scroll; font-size: 12px; }
        .status { padding: 5px; margin: 5px 0; border-radius: 3px; }
        .running { background: #d4edda; color: #155724; }
        .stopped { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>APRS Updater Daemon</h1>
    
    <div class="section">
        <h2>Status</h2>
        <div id="status" class="status stopped">Loading...</div>
        <button onclick="startDaemon()">Start Daemon</button>
        <button onclick="stopDaemon()">Stop Daemon</button>
        <button onclick="sendNow()">Send Now</button>
    </div>

    <div class="section">
        <h2>Connection Settings</h2>
        <label>Callsign: <input id="callsign" style="width:100px"></label>
        <label>Passcode: <input id="passcode" style="width:80px" type="password"></label>
        <label>API Key: <input id="api_key" style="width:200px"></label>
        <label>Server: <input id="server" style="width:200px"></label>
        <label>Port: <input id="port" style="width:60px"></label>
        <label>Interval (min): <input id="interval" style="width:60px" type="number"></label>
        <button onclick="saveConfig()">Save Config</button>
        <button onclick="loadConfig()">Reload Config</button>
        <button onclick="exportConfig()">Export Config</button>
        <button onclick="document.getElementById('importFile').click()">Import Config</button>
        <input type="file" id="importFile" style="display:none" onchange="importConfig(this)">
    </div>

    <div class="section">
        <h2>Objects</h2>
        <div id="objects"></div>
    </div>

    <div class="section">
        <h2>Log</h2>
        <div id="log" class="log"></div>
    </div>

    <script>
        const symbols = [
            "House (Primary)", "House w/ HF (Alt)", "Red Cross (Primary)", "Red Cross (Alt)",
            "Helicopter (Primary)", "Helicopter (Alt)", "Plane (Primary)", "Plane (Alt)",
            "Car (Primary)", "Car (Alt)", "Boat (Alt)", "Sailboat (Alt)",
            "Lighthouse (Alt)", "RV (Primary)", "RV (Alt)", "Repeater Tower",
            "Radio Tower (Primary)", "Shack w/ Antenna", "Restaurant (Alt)",
            "Bicycle (Alt)", "Fire (Alt)", "Church (Alt)", "School (Alt)",
            "Hospital (Alt)", "Police (Alt)", "Marker (Alt)", "Circle (Alt)"
        ];

        let localObjects = [];
        let saveTimeout = null;

        function loadConfig() {
            fetch('/api/config').then(r => r.json()).then(cfg => {
                document.getElementById('callsign').value = cfg.callsign || '';
                document.getElementById('passcode').value = cfg.passcode || '';
                document.getElementById('api_key').value = cfg.api_key || '';
                document.getElementById('server').value = cfg.server || 'rotate.aprs.net';
                document.getElementById('port').value = cfg.port || '14580';
                document.getElementById('interval').value = cfg.interval || 15;
                localObjects = cfg.objects || [];
                renderObjects();
            });
        }

        function saveConfig() {
            const cfg = {
                callsign: document.getElementById('callsign').value,
                passcode: document.getElementById('passcode').value,
                api_key: document.getElementById('api_key').value,
                server: document.getElementById('server').value,
                port: document.getElementById('port').value,
                interval: parseInt(document.getElementById('interval').value) || 15,
                objects: localObjects
            };
            fetch('/api/config', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(cfg)})
                .then(r => r.json()).then(d => alert('Saved: ' + d.status));
        }

        function renderObjects() {
            const div = document.getElementById('objects');
            div.innerHTML = '';
            for (let i = 0; i < localObjects.length; i++) {
                const o = localObjects[i] || {};
                const d = document.createElement('div');
                d.className = 'obj' + (o.enabled ? ' enabled' : '');
                
                const nameInput = document.createElement('input');
                nameInput.value = o.name || '';
                nameInput.style.width = '120px';
                nameInput.oninput = () => { localObjects[i].name = nameInput.value; debouncedSave(); };
                
                const symbolSelect = document.createElement('select');
                symbols.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.text = s;
                    if (o.symbol === s) opt.selected = true;
                    symbolSelect.appendChild(opt);
                });
                symbolSelect.onchange = () => { localObjects[i].symbol = symbolSelect.value; debouncedSave(); };
                
                const latInput = document.createElement('input');
                latInput.value = o.latitude || '';
                latInput.style.width = '100px';
                latInput.oninput = () => { localObjects[i].latitude = latInput.value; debouncedSave(); };
                
                const lonInput = document.createElement('input');
                lonInput.value = o.longitude || '';
                lonInput.style.width = '100px';
                lonInput.oninput = () => { localObjects[i].longitude = lonInput.value; debouncedSave(); };
                
                const descTextarea = document.createElement('textarea');
                descTextarea.value = o.description || '';
                descTextarea.rows = 3;
                descTextarea.style.width = '400px';
                descTextarea.style.fontFamily = 'monospace';
                descTextarea.oninput = () => { localObjects[i].description = descTextarea.value; debouncedSave(); };
                
                const enabledCheckbox = document.createElement('input');
                enabledCheckbox.type = 'checkbox';
                enabledCheckbox.checked = o.enabled || false;
                enabledCheckbox.onchange = () => { localObjects[i].enabled = enabledCheckbox.checked; debouncedSave(); };
                
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Delete';
                deleteBtn.onclick = () => { deleteObj(i); };
                
                d.innerHTML = `<b>Object ${i+1}</b> `;
                d.appendChild(document.createTextNode('Name: '));
                d.appendChild(nameInput);
                d.appendChild(document.createTextNode(' Symbol: '));
                d.appendChild(symbolSelect);
                d.appendChild(document.createElement('br'));
                d.appendChild(document.createTextNode('Lat: '));
                d.appendChild(latInput);
                d.appendChild(document.createTextNode(' Lon: '));
                d.appendChild(lonInput);
                d.appendChild(document.createElement('br'));
                d.appendChild(document.createTextNode('Desc: '));
                d.appendChild(descTextarea);
                d.appendChild(document.createElement('br'));
                d.appendChild(enabledCheckbox);
                d.appendChild(document.createTextNode(' Enabled '));
                d.appendChild(deleteBtn);
                
                div.appendChild(d);
            }
        }

        function debouncedSave() {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveObjectsOnly();
            }, 500);
        }

        function saveObjectsOnly() {
            fetch('/api/config').then(r => r.json()).then(cfg => {
                cfg.objects = localObjects;
                fetch('/api/config', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(cfg)});
            });
        }

        function deleteObj(idx) {
            localObjects[idx] = {name:'', symbol:'House (Primary)', latitude:'', longitude:'', description:'', enabled:false};
            renderObjects();
            debouncedSave();
        }

        function startDaemon() {
            fetch('/api/daemon/start', {method: 'POST'}).then(r => r.json()).then(d => alert(d.status));
        }

        function stopDaemon() {
            fetch('/api/daemon/stop', {method: 'POST'}).then(r => r.json()).then(d => alert(d.status));
        }

        function sendNow() {
            fetch('/api/send', {method: 'POST'}).then(r => r.json()).then(d => alert(d.status));
        }

        function updateStatus() {
            fetch('/api/status').then(r => r.json()).then(s => {
                const el = document.getElementById('status');
                el.className = 'status ' + (s.daemon_running ? 'running' : 'stopped');
                el.textContent = s.daemon_running ? 'Daemon Running' : 'Daemon Stopped';
            });
        }

        function exportConfig() {
            fetch('/api/config').then(r => r.json()).then(cfg => {
                const data = JSON.stringify(cfg, null, 2);
                const blob = new Blob([data], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'aprsupdater.json';
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        function importConfig(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const cfg = JSON.parse(e.target.result);
                fetch('/api/config', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(cfg)})
                    .then(r => r.json()).then(d => {
                        alert('Imported: ' + d.status);
                        loadConfig();
                    });
            };
            reader.readAsText(file);
        }

        loadConfig();
        updateStatus();
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
