name: Build APRS Daemon

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: aprsupdater-daemon-x86_64
          - goos: linux
            goarch: arm64
            output: aprsupdater-daemon-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            output: aprsupdater-daemon-arm32
          - goos: windows
            goarch: amd64
            output: aprsupdater-daemon-windows-x86_64.exe
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build daemon
        working-directory: ./daemon-app
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          go mod tidy
          go build -o ../${{ matrix.output }} .
      
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.output }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
